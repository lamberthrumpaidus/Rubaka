<html><title>RUBAKA</title><meta name="author" content="Lamberth Rumpaidus"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" /><link rel="shortcut icon"/><style>body{touch-action:none;overflow:hidden;background:#000;margin:0px;font-family:sans-serif;}h1{color:#fff;text-align:center;margin-top:30px;}h2{color:#666;font-style:italic;text-align:center;}.tbtn{display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold;color:#000;background:rgba(255,255,255,0.5);border:2px solid #fff;border-radius:50%;opacity:0.5;position:absolute;width:50px;height:50px;user-select:none;}</style><h1>🔥 RUBAKA 👑</h1><h2>(Press any key to start)</h2><canvas></canvas><div id="touchui" style="display:none;position:fixed;bottom:0;width:100%;height:100%;z-index:9;user-select:none;"><div id="t_u" class="tbtn" style="display:none;bottom:120px;left:70px;font-size:24px;">&#8593;</div><div id="t_d" class="tbtn" style="display:none;bottom:20px;left:70px;font-size:24px;">&#8595;</div><div id="t_l" class="tbtn" style="bottom:70px;left:20px;font-size:24px;">&#8592;</div><div id="t_r" class="tbtn" style="bottom:70px;left:120px;font-size:24px;">&#8594;</div><div id="t_a" class="tbtn" style="bottom:30px;right:30px;width:70px;height:70px;font-size:16px;">ATTACK</div><div id="t_j" class="tbtn" style="bottom:120px;right:30px;">JUMP</div><div id="t_c" class="tbtn" style="display:none;bottom:100px;right:100px;">DASH</div><div id="t_v" class="tbtn" style="display:none;bottom:40px;right:120px;">FIRE</div><div id="t_p" class="tbtn" style="top:80px;right:20px;font-size:12px;">PAUSE</div><div id="t_m" class="tbtn" style="top:20px;right:20px;font-size:12px;">MAP</div></div><script>(() => {
  // src/bus.js
  var HANDLES = {};
  function on(e, handler) {
    (HANDLES[e] || (HANDLES[e] = [])).push(handler);
  }
  function off(e, handler) {
    HANDLES[e] = (HANDLES[e] || []).filter((x) => x != handler);
  }
  function emit(e, data) {
    (HANDLES[e] || []).map((handler) => handler(data));
  }

  // src/assets.js
  var headMeshAsset = [
    ["#e22", 9, 0],
    [14, -40, 18, -26, 1, 0, -1, 0, -18, -26, -14, -40],
    [-7, -11, 7, -11],
    ["#fff", 4, 5],
    [-9, -11, -3, -9],
    [9, -11, 3, -9]
  ];
  var boneMeshAsset = [
    ["#fff", 6, 0],
    [-11, -7, -7, -7, 7, 7, 7, 11],
    [-7, -11, -7, -7, 7, 7, 11, 7]
  ];
  var symbolMeshAssets = [
    [["#4af", 2, 0], [10, -12, 15, 12, -15, 12, 0, 0, -10, 0]],
    [["#4af", 2, 0], [10, -15, -10, -7, 10, 0, -10, 7, 10, 15]],
    [["#4af", 2, 0], [0, -18, 0, -5, 12, 0, 0, 12, -12, 0]],
    [["#4af", 2, 0], [-15, -11, -15, 11, 0, 11, 0, -11, 15, -11, 15, 11]],
    [["#4af", 2, 0], [0, -15, 10, 0, 0, 15, -10, 0, 0, -15]]
  ];
  var treasureMeshAsset = [
    ["#a63", 8, 0],
    [20, 0, -20, 0, -28, -23, 28, -23, 20, 0],
    [-28, -23, -24, -40, 24, -40, 28, -23],
    ["#ffa", 8, 0],
    [0, -27, 0, -19]
  ];
  var regionTitles = [
    "The Crossroads",
    "Undergrowth",
    "Boneyard Caverns",
    "Fields of Mourning",
    "Throne Room"
  ];
  var makeGradient = (x, y) => {
    let gradient = ctx.createLinearGradient(x, y, x, y - 200);
    gradient.addColorStop(0, "rgba(255,255,110,0.3)");
    gradient.addColorStop(1, "rgba(255,255,110,0.0)");
    return gradient;
  };

  // src/canvas.js
  var canvas = document.getElementsByTagName("canvas")[0];
  canvas.width = innerWidth;
  canvas.height = innerHeight;
  window.onresize = () => {
    canvas.width = innerWidth;
    canvas.height = innerHeight;
    ctx.imageSmoothingEnabled = false;
  };
  var ctx;
  function color(c, c2) {
    ctx.strokeStyle = c;
    ctx.fillStyle = c2 || c;
  }
  function scaleInPlace(s, x, y, s2) {
    ctx.translate(x, y);
    ctx.scale(s, s2 || s);
    ctx.translate(-x, -y);
  }
  function renderMesh(mesh, x, y, baseZ, theta, phi, fillColor) {
    retainTransform(() => {
      ctx.translate(x, y);
      ctx.rotate(phi);
      const d = Math.cos(theta);
      const d2 = Math.sin(theta);
      let z = baseZ;
      for (let r = 0; r < mesh.length; r++) {
        const data = mesh[r];
        if (data.length == 3) {
          color(data[0], fillColor || data[0]);
          ctx.lineWidth = data[1];
          z = baseZ + data[2];
        } else {
          ctx.beginPath();
          ctx.moveTo(data[0] * d - z * d2, data[1]);
          for (let i = 2; i < data.length; i += 2) {
            ctx.lineTo(data[i] * d - z * d2, data[i + 1]);
          }
          if (fillColor) {
            ctx.fill();
          }
          ctx.stroke();
        }
      }
    });
  }
  function renderText(txt, x, y, size) {
    ctx.fillStyle = "#fff";
    ctx.textAlign = "left";
    ctx.font = `bold ${size}px arial`;
    ctx.fillText(txt, x, y);
  }
  function retainTransform(fn) {
    const xfm = ctx.getTransform();
    fn();
    ctx.setTransform(xfm);
  }
  var favicon = document.createElement("canvas");
  favicon.width = favicon.height = 64;
  ctx = favicon.getContext("2d");
  renderMesh(headMeshAsset, 32, 48, 0, 0, 0);
  ctx = canvas.getContext("2d");
  var link = document.querySelector("link");
  link.href = favicon.toDataURL();
  ctx.imageSmoothingEnabled = false;

  // src/events.js
  var EVENT_ATTACK = 0;
  var EVENT_ATTACK_HIT = 1;
  var EVENT_PLAYER_HIT = 2;
  var EVENT_WALK = 3;
  var EVENT_JUMP = 4;
  var EVENT_DASH = 5;
  var EVENT_FLAP = 6;
  var EVENT_FIREBALL = 7;
  var EVENT_BONE_COLLECT = 8;
  var EVENT_BONE_DINK = 9;
  var EVENT_SWITCH = 10;
  var EVENT_REGION = 11;
  var EVENT_FOCUS = 12;
  var EVENT_FOCUS_STOP = 13;
  var EVENT_PLAYER_ABILITY_GRANT = 14;
  var EVENT_PLAYER_CHECKPOINT = 15;
  var EVENT_WEB_BOING = 16;
  var EVENT_ANY_KEY = 17;
  var EVENT_SFX_FLAME = 18;
  var EVENT_BONE_SPAWN = 19;
  var EVENT_PLAYER_RESET = 20;
  var EVENT_SET_VOLUME = 21;

  // src/controls.js
  var pressed = {};
  var GAMEPAD_BUTTON_MAP = {
    0: "PadSouth",
    1: "PadEast",
    2: "PadWest",
    3: "PadNorth",
    4: "PadLBumper",
    6: "PadLTrigger",
    12: "DPadUp",
    13: "DPadDown",
    14: "DPadLeft",
    15: "DPadRight"
  };
  function updateGameControls() {
    const gp = getGamePad();
    if (!gp) {
      return;
    }
    Object.entries(GAMEPAD_BUTTON_MAP).map(([btn, code]) => mapPadToKey(gp?.buttons[btn], code));
  }
  onkeydown = (evt) => {
    if (!pressed[evt.code]) {
      pressed[evt.code] = Date.now();
    }
    emit(EVENT_ANY_KEY);
  };
  onkeyup = (evt) => delete pressed[evt.code];
  window.addEventListener("mousedown", (e) => {
    if (e.button === 0 && !pressed["MouseLeft"]) {
      pressed["MouseLeft"] = Date.now();
      emit(EVENT_ANY_KEY);
    }
  });
  window.addEventListener("mouseup", (e) => {
    if (e.button === 0) {
      delete pressed["MouseLeft"];
    }
  });
  window.addEventListener("touchstart", (e) => {
    const tui = document.getElementById("touchui");
    if (tui && tui.style.display === "none") {
      tui.style.display = "block";
    }
  }, { passive: false });
  window.addEventListener("load", () => {
    function hookTouch(id, keycode) {
      const el = document.getElementById(id);
      if (!el)
        return;
      el.addEventListener("touchstart", (e) => {
        e.preventDefault();
        pressed[keycode] = Date.now();
        emit(EVENT_ANY_KEY);
        window.dispatchEvent(new KeyboardEvent("keydown", { code: keycode, key: keycode }));
      }, { passive: false });
      el.addEventListener("touchend", (e) => {
        e.preventDefault();
        delete pressed[keycode];
        window.dispatchEvent(new KeyboardEvent("keyup", { code: keycode, key: keycode }));
      }, { passive: false });
    }
    hookTouch("t_u", "ArrowUp");
    hookTouch("t_d", "ArrowDown");
    hookTouch("t_l", "ArrowLeft");
    hookTouch("t_r", "ArrowRight");
    hookTouch("t_a", "Enter");
    hookTouch("t_j", "KeyZ");
    hookTouch("t_c", "KeyC");
    hookTouch("t_v", "KeyV");
    hookTouch("t_p", "Escape");
    hookTouch("t_m", "KeyM");
  });
  var currentGamePadId = 0;
  window.addEventListener("gamepadconnected", (e) => {
    currentGamePadId = e.gamepad.index;
  });
  function getGamePad() {
    return navigator.getGamepads()[currentGamePadId];
  }
  function mapPadToKey(button, keyname) {
    if (!pressed[keyname] && button?.value > 0.5) {
      onkeydown({ code: keyname });
    }
    if (pressed[keyname] && button?.value < 0.5) {
      onkeyup({ code: keyname });
    }
  }
  var horizontal = () => (pressed["ArrowLeft"] || pressed["KeyA"] || getGamePad()?.axes[0] < -0.4 || pressed["DPadLeft"] ? -1 : 0) + (pressed["ArrowRight"] || pressed["KeyD"] || getGamePad()?.axes[0] > 0.4 || pressed["DPadRight"] ? 1 : 0);
  var vertical = () => (pressed["ArrowUp"] || pressed["KeyW"] || getGamePad()?.axes[1] < -0.4 || pressed["DPadUp"] ? 1 : 0) + (pressed["ArrowDown"] || pressed["KeyS"] || getGamePad()?.axes[1] > 0.4 || pressed["DPadDown"] ? -1 : 0);
  var recent = (f) => Date.now() - pressed[f] < 100;
  var jump = () => recent("KeyZ") || recent("Space") || recent("PadSouth");
  var attack = () => recent("KeyX") || recent("Enter") || recent("MouseLeft") || recent("PadWest");
  var dash = () => recent("KeyC") || recent("KeyK") || recent("PadEast") || recent("PadLTrigger");
  var ignite = () => recent("KeyV") || recent("KeyL") || recent("PadNorth");
  var holdingJump = () => pressed["KeyZ"] || pressed["Space"] || pressed["PadSouth"];
  var holdingMap = () => pressed["KeyM"] || pressed["KeyN"] || pressed["PadLBumper"];

  // src/tags.js
  var TAG_CAMERA = 0;
  var TAG_PLAYER = 1;
  var TAG_ENEMY = 2;
  var TAG_PHYSICS = 3;
  var TAG_MAP = 4;

  // src/engine.js
  var gameObjects = [];
  var gameObjectsByTag = {};
  var objectsToRemove = [];
  var lastFrameMs = 0;
  var startTime = 0;
  var startInvoked = false;
  var isPaused = false;
  function togglePause() {
    isPaused = !isPaused;
  }
  function tick(currentFrameMs) {
    updateGameControls();
    if (!startInvoked) {
      requestAnimationFrame(tick);
      return;
    }
    const dT = Math.min((currentFrameMs - lastFrameMs) * 1e-3, 0.018);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.textBaseline = "middle";
    ctx.lineJoin = "round";
    ctx.lineCap = "round";
    ctx.globalCompositeOperation = "source-over";
    ctx.shadowBlur = 0;
    retainTransform(() => {
      const camera = getObjectsByTag(TAG_CAMERA)[0];
      if (camera) {
        camera.set(ctx);
      }
      if (!isPaused) {
        objectsToRemove.length = 0;
        gameObjects.map((g) => {
          if (g.update?.(dT)) {
            objectsToRemove.push(g);
          }
        });
        if (objectsToRemove.length) {
          remove(objectsToRemove);
        }
      }
      if (camera) {
        gameObjects.map((g) => {
          if (g.inView(camera.x, camera.y)) {
            g.render?.(ctx);
          }
        });
      } else {
        gameObjects.map((g) => {
          g.render?.(ctx);
        });
      }
      if (isPaused) {
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fff";
        ctx.textAlign = "center";
        ctx.font = "bold 40px arial";
        ctx.fillText("PAUSED", canvas.width / 2, canvas.height / 2);
      }
      lastFrameMs = currentFrameMs;
    });
    requestAnimationFrame(tick);
  }
  function add(obj) {
    if (!obj.inView) {
      obj.inView = () => 1;
    }
    gameObjects.push(obj);
    gameObjects.sort((a, b) => (a.order || 0) - (b.order || 0));
    obj.tags?.map((tag) => {
      gameObjectsByTag[tag] = gameObjectsByTag[tag] ?? [];
      gameObjectsByTag[tag].push(obj);
    });
  }
  function arrayRemove(list, valuesToEvict) {
    return list.filter((g) => !valuesToEvict.includes(g));
  }
  function remove(objList) {
    gameObjects = arrayRemove(gameObjects, objList);
    objList.map((obj) => {
      obj.tags?.map((tag) => {
        gameObjectsByTag[tag] = arrayRemove(gameObjectsByTag[tag], [obj]);
      });
    });
  }
  function clear() {
    gameObjects = [];
  }
  function start() {
    startInvoked = true;
    startTime = Date.now();
  }
  function getObjectsByTag(tag) {
    return gameObjectsByTag[tag] || [];
  }
  function getStartTime() {
    return startTime;
  }
  requestAnimationFrame(tick);

  // src/gamestate.js
  var bones = 0;
  var hp = 3;
  var checkpointId = 0;
  var deathCount = 0;
  var treasures = 0;
  var totalTreasures = 0;
  function saveProgress() {
  }
  function loadProgress() {
  }
  function addHp(h) {
    hp += h;
  }
  function getHp() {
    return hp;
  }
  function addBones(b) {
    bones = Math.max(bones + b, 0);
    saveProgress();
  }
  function getBones() {
    return bones;
  }
  function respawn() {
    bones = bones >> 1;
    hp = 3;
    deathCount++;
    saveProgress();
  }
  function setCheckpointId(id) {
    checkpointId = id;
    hp = 3;
    saveProgress();
  }
  function getCheckpointId() {
    return checkpointId;
  }
  function getDeathCount() {
    return deathCount;
  }
  function foundTreasure() {
    treasures++;
    saveProgress();
  }
  function getTreasures() {
    return treasures;
  }
  function getTotalNumTreasure() {
    return totalTreasures;
  }
  function setTotalNumTreasure(v) {
    totalTreasures = v;
  }

  // src/bbox.js
  function inBound(x, w, x2, w2) {
    return x2 + w2 > x && x2 < x + w;
  }
  function containPt(a, x, y) {
    return x > a.x + a.ox && x < a.x + a.ox + a.w && y > a.y + a.oy && y < a.y + a.oy + a.h;
  }
  function isTouching(a, b) {
    const c = inBound(a.x + a.ox, a.w, b.x + b.ox, b.w) && inBound(a.y + a.oy, a.h, b.y + b.oy, b.h);
    return c;
  }
  function BoundingBox(x, y, ox, oy, w, h) {
    const self = {};
    self.set = (x_, y_, ox_, oy_, w_, h_) => {
      self.x = x_;
      self.y = y_;
      self.ox = ox_;
      self.oy = oy_;
      self.w = w_;
      self.h = h_;
    };
    self.isTouching = (other) => {
      return isTouching(self, other);
    };
    self.set(x, y, ox, oy, w, h);
    return self;
  }

  // src/utils.js
  function clamp(v, min, max) {
    return Math.max(Math.min(v, max), min);
  }
  function copy(arr) {
    return JSON.parse(JSON.stringify(arr));
  }
  function inView(x, y, cx, cy) {
    const dw = 1100;
    const dh = canvas.height / canvas.width * 1400;
    return !(x > cx + dw || y > cy + dh || x < cx - dw || y < cy - dh);
  }
  var physicsResult = [0, 0, false, false, false, false];
  function physicsCheck(myHitbox) {
    let x = myHitbox.x;
    let y = myHitbox.y;
    let onGround = false;
    let onRightWall = false;
    let onLeftWall = false;
    let onRoof = false;
    getObjectsByTag(TAG_PHYSICS).map(({ physics }) => {
      if (myHitbox.isTouching(physics)) {
        let onThisWall = false;
        if (y + myHitbox.oy + 10 < physics.y + physics.h && y + myHitbox.oy + myHitbox.h - 10 > physics.y) {
          if (x - 10 < physics.x) {
            x = physics.x + physics.ox - myHitbox.ox - myHitbox.w + 0.1;
            onRightWall = true;
            onThisWall = true;
          }
          if (x + 10 > physics.x + physics.w) {
            x = physics.x + physics.ox + physics.w - myHitbox.ox - 0.1;
            onLeftWall = true;
            onThisWall = true;
          }
        }
        if (!onThisWall) {
          if (y - 45 < physics.y) {
            y = physics.y + physics.oy - myHitbox.oy - myHitbox.h + 0.1;
            onGround = true;
          }
          if (y + myHitbox.oy + myHitbox.h / 2 > physics.y + physics.h) {
            y = physics.y + physics.oy + physics.h - myHitbox.oy + 0.1;
            onRoof = true;
          }
        }
        myHitbox.x = x;
        myHitbox.y = y;
      }
    });
    physicsResult[0] = x;
    physicsResult[1] = y;
    physicsResult[2] = onGround;
    physicsResult[3] = onRightWall;
    physicsResult[4] = onLeftWall;
    physicsResult[5] = onRoof;
    return physicsResult;
  }
  var groundResult = [false, false];
  function groundCheck(myHitbox, wx = 1, wy = 0) {
    let hasRight2 = false;
    let hasLeft2 = false;
    getObjectsByTag(TAG_PHYSICS).map(({ physics }) => {
      if (containPt(physics, myHitbox.x + 40 * wx - 4 * wy, myHitbox.y + 4 * wx + 40 * wy)) {
        hasRight2 = true;
      }
      if (containPt(physics, myHitbox.x - 40 * wx - 4 * wy, myHitbox.y + 4 * wx - 40 * wy)) {
        hasLeft2 = true;
      }
    });
    groundResult[0] = hasRight2;
    groundResult[1] = hasLeft2;
    return groundResult;
  }

  // src/hud.js
  function HUD() {
    let regionTitle;
    let regionTitleTimer;
    let totalTime;
    let fadeIn = 0;
    let unlockedAbilities = {};
    function syncButtons() {
      const t_c = document.getElementById("t_c");
      if (t_c) {
        t_c.style.display = unlockedAbilities[0] ? "flex" : "none";
        document.getElementById("t_u").style.display = unlockedAbilities[1] ? "flex" : "none";
        document.getElementById("t_d").style.display = unlockedAbilities[1] ? "flex" : "none";
        document.getElementById("t_v").style.display = unlockedAbilities[2] ? "flex" : "none";
      }
    }
    syncButtons();
    const headMesh = copy(headMeshAsset);
    const boneMesh = copy(boneMeshAsset);
    const treasureMesh = copy(treasureMeshAsset);
    function update(dT) {
      regionTitleTimer -= dT;
      fadeIn += dT;
    }
    function render(ctx2) {
      retainTransform(() => {
        if (holdingMap()) {
          ctx2.setTransform(1, 0, 0, 1, 0, 0);
          ctx2.fillStyle = "rgba(0,0,0,0.7)";
          ctx2.fillRect(0, 0, canvas.width, canvas.height);
          ctx2.setTransform(4, 0, 0, 4, canvas.width / 2 - 252, canvas.height / 2 - 252);
          ctx2.drawImage(getObjectsByTag(TAG_MAP)[0].m, 0, 0);
          if (Math.cos(Date.now() / 50) < 0.5) {
            const player = getObjectsByTag(TAG_PLAYER)[0].playerHitbox;
            ctx2.fillStyle = "#e22";
            ctx2.fillRect(player.x / 100 - 0.5, player.y / 100 - 1.5, 2, 2);
          }
        }
        ctx2.setTransform(0.8, 0, 0, 0.8, 0, 0);
        for (let i = 0; i < 3; i++) {
          if (i >= getHp()) {
            headMesh[0][0] = headMesh[3][0] = "#555";
          } else {
            headMesh[0][0] = "#e22";
            headMesh[3][0] = "#fff";
          }
          renderMesh(headMesh, 50 + i * 55, 72, 0, 0, 0);
        }
        renderMesh(boneMesh, 50, 144, 0, -regionTitleTimer, 0);
        renderText(getBones(), 80, 146, 30);
        if (regionTitleTimer > 0) {
          ctx2.globalAlpha = clamp(regionTitleTimer, 0, 1) * clamp(-regionTitleTimer + totalTime, 0, 1);
          ctx2.lineWidth = 18;
          renderText(regionTitle, 36, canvas.height * 1.15, 80);
          ctx2.strokeStyle = "#000";
          ctx2.strokeText(regionTitle, 36, canvas.height * 1.15);
          renderText(regionTitle, 36, canvas.height * 1.15, 80);
          ctx2.globalAlpha = 1;
        }
        renderText(`${getTreasures()} / ${getTotalNumTreasure()}`, 80, 103, 30);
        scaleInPlace(0.5, 50, 102);
        renderMesh(treasureMesh, 50, 120, 0, 0, 0, "#742");
        if (fadeIn < 2) {
          ctx2.setTransform(1, 0, 0, 1, 0, 0);
          ctx2.fillStyle = `rgba(0,0,0,${1 - fadeIn * fadeIn / 4})`;
          ctx2.fillRect(0, 0, canvas.width, canvas.height);
        }
      });
    }
    function onRegionChange(regionId) {
      regionTitle = regionTitles[regionId];
      totalTime = 6;
      regionTitleTimer = totalTime;
    }
    function onCheckpoint() {
      regionTitle = "Checkpoint";
      totalTime = 4;
      regionTitleTimer = totalTime;
    }
    function onGrant(a) {
      unlockedAbilities[a] = true;
      let playTimeSeconds = (Date.now() - getStartTime()) / 1e3;
      let playTimeMinutes = parseInt(playTimeSeconds / 60);
      playTimeSeconds -= playTimeMinutes * 60;
      regionTitle = [
        "Twisted Horns - Dash",
        "Iron Claws - Climb walls",
        "Fireball - Fireball",
        "Wingspan - Wingspan",
        `VICTORY! \u{1F9B4}${getBones()}  \u231B${playTimeMinutes}:${playTimeSeconds < 10 ? "0" : ""}${playTimeSeconds.toFixed(1)}  \u{1F480}${getDeathCount()}`
      ][a];
      totalTime = a == 4 ? 30 : 5;
      regionTitleTimer = totalTime;
      syncButtons();
    }
    on(EVENT_REGION, onRegionChange);
    on(EVENT_PLAYER_CHECKPOINT, onCheckpoint);
    on(EVENT_PLAYER_ABILITY_GRANT, onGrant);
    return {
      update,
      render,
      order: 1e4
    };
  }

  function Wall(x, y, ex, ey, outlineData, BLOCK_SIZE, palette) {
    const w = (ex - x) * BLOCK_SIZE;
    const h = (ey - y) * BLOCK_SIZE;
    x = (x - 0.5) * BLOCK_SIZE;
    y = (y - 0.5) * BLOCK_SIZE;
    const physics = BoundingBox(x, y, 0, 0, w, h);
    const wallMesh = [
      [palette[0], 5, 0]
    ];
    let outlineTop = [];
    let dx = Math.random() * 6 + 6;
    for (let i = 0; i < w; i += dx) {
      outlineTop.push(i, Math.random() * 6, Math.min(w, i + dx), -Math.random() * 2);
      dx = Math.random() * 6 + 6;
    }
    wallMesh.push(outlineTop, ...outlineData[0], [w, h, 0, h], ...outlineData[1]);
    function render(ctx2) {
      ctx2.fillStyle = palette[1];
      ctx2.fillRect(x - 1, y, w + 2, h);
      renderMesh(wallMesh, x, y, 0, 0, 0);
    }
    function inView2(cx, cy) {
      const dw = 1100;
      const dh = canvas.height / canvas.width * 1e3;
      return !(x > cx + dw || y > cy + dh || x + w < cx - dw || y + h < cy - dh);
    }
    return {
      render,
      inView: inView2,
      tags: [TAG_PHYSICS],
      physics,
      order: -5e3
    };
  }

  function FlameSFX(x, y, scale, lifetime, rot = 0) {
    let anim = 0;
    let baseScale = scale;
    function update(dT) {
      anim += 5 * dT;
      lifetime -= dT;
      scale = Math.min(baseScale * anim * 2, baseScale);
      if (lifetime < 0.5) {
        scale = baseScale * lifetime * 2;
        anim += 3 * dT;
      }
      if (lifetime < 0) {
        return true;
      }
    }
    function render(ctx2) {
      retainTransform(() => {
        ctx2.globalCompositeOperation = "lighter";
        ctx2.translate(x, y);
        ctx2.rotate(-rot);
        ctx2.fillStyle = "#f93";
        for (let i = 0; i < 6; i++) {
          let p = (i + anim) % 6 / 6;
          let s = scale * clamp(10 * p / (1 + p * p * 15) * (1 - p), 0, 1);
          ctx2.beginPath();
          ctx2.arc(Math.cos(i * 4) * scale, -p * 40 * scale, 10 * s, 0, 6.28);
          ctx2.fill();
        }
        ctx2.fillStyle = "#f53";
        ctx2.beginPath();
        ctx2.arc(Math.cos(anim * 13) * scale / 2, -scale * 4, 5 * scale * (1 + Math.cos(anim * 11) * 0.1), 0, 6.28);
        ctx2.fill();
        ctx2.globalCompositeOperation = "source-over";
      });
    }
    return {
      update,
      render,
      set: (a) => {
        x = a;
      },
      end: () => {
        lifetime = 0.25;
      },
      inView: (cx, cy) => inView(x, y, cx, cy),
      order: -4500
    };
  }
  var flame_sfx_default = FlameSFX;

      jumpSound = await generate(0.1, (i) => {

      fireballSound = await generate(0.4, (i) => {

      boneCollectSound = await generate(0.06, (i) => {

      switchSound = await generate(1.5, (i) => {

      grantSound = await generate(2, (i) => {

      boingSound = await generate(0.6, (i) => {
        return 0.06 * sin(i / (20 + sin(i / 900) + i / 1300));

      setProgress(0.3);
      musicDrumBuffer = audioCtx.createBuffer(1, sampleRate, sampleRate);
      drumBuffer = musicDrumBuffer.getChannelData(0);
      const W = 0.1 * sampleRate;
      for (let j = 0; j < W; j++) {
        drumBuffer[j] += 0.01 * (sin(j / (70 + j / 300)) + Math.random() / 3) * (1 - j / W);
        drumBuffer[parseInt(0.5 * sampleRate) + j] += 0.01 * Math.random() * (1 - j / W);
      }
      await _yield();
      musicFocusBuffer = audioCtx.createBuffer(1, sampleRate * 3, sampleRate);
      const focusBuffer = musicFocusBuffer.getChannelData(0);
      for (let j = 0; j < sampleRate * 3; j++) {

      }
      await _yield();
      setProgress(0.35);
      const song1 = await genericSongBuilder([[0, 2, 3, 5, 7, 12], 1.3], 0, 0.35, 0.45);
      setProgress(0.7);
      const song2 = await genericSongBuilder([[0, 2, 3, 5, 7, 8, 11, 12], 0.5], 1, 0.45, 0.6);
      setProgress(0.75);
      const song3 = await genericSongBuilder([[0, 2, 3, 7, 8, 12], 0.9], 2, 0.6, 0.7);
      setProgress(0.8);
      const song4 = await genericSongBuilder([[0, 2, 3, 7, 8, 12], 1.2], 3, 0.7, 0.85);
      setProgress(0.9);
      const song5 = await genericSongBuilder([[0, 4, 5, 7, 12], 0.8], 4, 0.85, 1);
      setProgress(1);
      console.log("Generated song 5 and set progress 1.0");
      musicRegionBuffers = [song1, song2, song3, song4, song5];
      on(EVENT_ATTACK, ([, , , f]) => f ? 0 : play(attackSound)());
      on(EVENT_ATTACK_HIT, play(attackHitSound));

      on(EVENT_WALK, play(walkSound));
      on(EVENT_JUMP, play(jumpSound));
      on(EVENT_DASH, play(dashSound));
      on(EVENT_FLAP, play(flapSound));
      on(EVENT_FIREBALL, play(fireballSound));
      on(EVENT_BONE_COLLECT, play(boneCollectSound));
      on(EVENT_BONE_DINK, play(boneCollectSound));
      on(EVENT_SWITCH, play(switchSound));
      on(EVENT_REGION, onRegion);
      on(EVENT_FOCUS, () => {
        focusNode = audioCtx.createBufferSource();
        focusNode.buffer = musicFocusBuffer;
        focusNode.connect(masterGainNode);
        focusNode.start();

      on(EVENT_FOCUS_STOP, () => focusNode.stop());
      on(EVENT_PLAYER_ABILITY_GRANT, play(grantSound));
      on(EVENT_PLAYER_CHECKPOINT, play(grantSound));
      on(EVENT_WEB_BOING, play(boingSound));
      masterGainNode = audioCtx.createGain();
      masterGainNode.connect(audioCtx.destination);
      gainNodeA = audioCtx.createGain();
      gainNodeA.connect(masterGainNode);
      gainNodeB = audioCtx.createGain();
      gainNodeB.connect(masterGainNode);
      on(EVENT_SET_VOLUME, (h) => {
        const v = Math.min(Math.max(masterGainNode.gain.value + h, 0), 1);
        masterGainNode.gain.value = v;
      });
      console.log("audio.js init absolutely completed!");
    }
    async function genericSongBuilder([melodySignature, beat], seed, prog1, prog2) {
      const song = [];
      const drums = [];
      const noteLength = [4, 2, 0.5, 3, 4][seed];
      const noteSpace = [1, 0.5, 0.25, 2, 2][seed++];
      const bassNotes = [-15, -20, -19, -12];
      drums.push(
        [seed * seed * 3 * 0.5 % 2, seed % 2],
        [(seed * seed * 3 + seed * 9) * 0.5 % 2, (seed + 1) % 2],
        [(seed * seed * 2 + seed * 11) * 0.5 % 2, (seed + 1) % 2]
      );
      setProgress(prog1);
      for (let i = 0; i < 3; i++) {
        const o = i * 8;
        const q = [0, 3, -5][i];
        for (let j = 0; j < 8; j++) {
          song.push([bassNotes[(seed * 7 + i * 2 + (j >> 1) + j * j * 3) % 4] + q, j + o, 6, 1]);
        }
        for (let j = 0; j < 8 / noteSpace; j++) {
          if ((j + j * j + i + seed * 3) % 7 < 4) {
            song.push([-3 + q + melodySignature[(j + j * j * 2 + i * i * 2 + seed) % melodySignature.length], j * noteSpace + o, noteLength, 2]);
          }
        }
      }
      const targetBuffer = audioCtx.createBuffer(1, sampleRate * 8 * 3 * beat, sampleRate);
      const buffer = targetBuffer.getChannelData(0);
      for (let i = 0; i < song.length; i++) {
        let note, start2, duration, amp;
        [note, start2, duration, amp] = song[i];
        const baseIdx = parseInt(start2 * beat * sampleRate);
        const dur = duration * beat * sampleRate;
        for (let i2 = 0; i2 < dur; i2++) {
          let v = 0;
          const envelope = i2 / dur;
          v += amp == 1 ? clamp(sin(i2 / (6 * 2 ** (-note / 12) * 2 * 2) + sin(i2 / 8e3)) * (Math.exp(-envelope * 23) * 44 + 1), -1, 1) * 2 : saw(i2 / (4.03 * 6 * 2 ** (-note / 12) * 2)) * 7;
          buffer[baseIdx + i2] += v * Math.min(envelope * Math.exp(-envelope * (10 + amp * 7)) * 100, 1) / 500;
        }
        if (i % 8 === 0) {
          await _yield();
        }
        setProgress(prog1 + (prog2 - prog1) * (i / song.length) * 0.8);
      }
      for (let q = 0; q < 44; q += 2) {
        for (let j = 0; j < drums.length; j++) {
          let type, drumStart;
          [drumStart, type] = drums[j];
          const noteOffset = parseInt(0.5 * sampleRate * type);
          const startOffset = parseInt((drumStart + q) * sampleRate * beat);
          for (let k = 0; k < sampleRate * 0.1; k++) {
            buffer[k + startOffset] += drumBuffer[k + noteOffset];
          }
        }
        if (q % 8 === 0) {
          await _yield();
        }
        setProgress(prog1 + (prog2 - prog1) * (0.8 + 0.2 * (q / 44)));
      }
      return targetBuffer;
    }
    function play(audioBuffer) {
      return () => {
        let source = audioCtx.createBufferSource();
        source.buffer = audioBuffer;
        source.connect(masterGainNode);
        source.start();
      };
    }
    ;
    function onRegion(regionId) {
      music(musicRegionBuffers[regionId]);
    }
    function music(musicBuffer) {
      let audioToStop = activeMusicSource;
      activeMusicSource = audioCtx.createBufferSource();
      activeMusicSource.buffer = musicBuffer;
      activeMusicSource.loop = true;
      activeMusicSource.connect(usingA ? gainNodeA : gainNodeB);
      activeMusicSource.start();
      setTimeout(() => {
        audioToStop?.stop();
      }, 700);
      gainNodeA.gain.setTargetAtTime(usingA ? 1 : 0, audioCtx.currentTime, 0.5);
      gainNodeB.gain.setTargetAtTime(usingA ? 0 : 1, audioCtx.currentTime, 0.5);
      usingA = !usingA;
    }
    return {
      init
    };
  }
  var audio_default = Audio;

  // src/particles.js
  var particleCache = {};
  function getGlowImage(color2) {
    if (!particleCache[color2]) {
      const c = document.createElement("canvas");
      c.width = 30;
      c.height = 30;
      const ctx2 = c.getContext("2d");
      const grad = ctx2.createRadialGradient(15, 15, 0, 15, 15, 15);
      grad.addColorStop(0, color2);
      grad.addColorStop(1, "transparent");
      ctx2.fillStyle = grad;
      ctx2.beginPath();
      ctx2.arc(15, 15, 15, 0, Math.PI * 2);
      ctx2.fill();
      particleCache[color2] = c;
    }
    return particleCache[color2];
  }
  function ParticleEmit(x, y, count, color2, speedScale = 1) {
    const particles = [];
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 200 * speedScale;
      particles.push({
        x,
        y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 0.5 + Math.random() * 0.5,
        c: color2,
        update(dT) {
          this.x += this.vx * dT;
          this.y += this.vy * dT;
          this.vy += 800 * dT;
          this.life -= dT;
          return this.life <= 0;
        },
        render(ctx2) {
          ctx2.globalCompositeOperation = "lighter";
          ctx2.globalAlpha = this.life;
          ctx2.drawImage(getGlowImage(this.c), this.x - 15, this.y - 15);
          ctx2.globalAlpha = 1;
          ctx2.globalCompositeOperation = "source-over";
        },
        order: 100
      });
    }
    particles.map((p) => add(p));
  }
